<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>值日專區 - 寶格教育訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            400: '#d4a853',
                            500: '#c9952e',
                            600: '#b8841a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/duty-dark.css">
    <!-- LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="min-h-screen">
    <!-- 背景光暈 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- 頂部導航 -->
    <div class="nav-glass px-4 py-4 sticky top-0 z-10">
        <div class="flex items-center justify-between max-w-lg mx-auto">
            <h1 class="text-lg font-light text-white" style="letter-spacing: 0.15em;">
                <i class="fas fa-broom mr-2 text-gold" style="color: #d4a853;"></i>值 日 專 區
            </h1>
            <div id="user-info" class="flex items-center gap-2">
                <img id="user-avatar" src="" alt="" class="w-8 h-8 rounded-full hidden" style="border: 1px solid rgba(255,255,255,0.1);">
                <span id="user-name" class="text-sm" style="color: rgba(255,255,255,0.6);"></span>
            </div>
        </div>
    </div>

    <div class="max-w-lg mx-auto p-4 relative z-10">
        <!-- 載入中 -->
        <div id="loading-section" class="glass rounded-2xl p-10 text-center">
            <div class="inline-flex items-center justify-center w-14 h-14 mb-5">
                <i class="fas fa-spinner fa-spin text-2xl" style="color: #d4a853;"></i>
            </div>
            <p style="color: rgba(255,255,255,0.35); letter-spacing: 0.08em;" class="text-sm">正在載入...</p>
        </div>

        <!-- 主要內容區 -->
        <div id="main-content" class="hidden space-y-4">
            <!-- 今日值日提示 -->
            <div id="today-duty-alert" class="hidden duty-alert rounded-2xl p-4">
                <div class="flex items-center gap-3">
                    <div class="duty-alert-icon rounded-full p-3">
                        <i class="fas fa-bell text-2xl" style="color: #d4a853;"></i>
                    </div>
                    <div>
                        <p class="font-bold text-lg text-white">今天輪到你值日！</p>
                        <p class="text-sm" style="color: rgba(255,255,255,0.5);">請完成值日工作後回報</p>
                    </div>
                </div>
            </div>

            <!-- 功能選單 -->
            <div class="grid grid-cols-2 gap-4">
                <!-- 我的排班 -->
                <a href="/duty/my/schedule" id="link-schedule" class="glass rounded-2xl p-5 flex flex-col items-center justify-center min-h-[140px] hover:bg-white/[0.06] transition">
                    <div class="icon-circle w-14 h-14 rounded-full flex items-center justify-center mb-3">
                        <i class="fas fa-calendar-alt text-2xl"></i>
                    </div>
                    <span class="font-light text-white" style="letter-spacing: 0.05em;">我的排班</span>
                    <span class="text-xs mt-1" style="color: rgba(255,255,255,0.35);">查看值日時間</span>
                </a>

                <!-- 值日回報 -->
                <a href="/duty/my/report" id="link-report" class="glass rounded-2xl p-5 flex flex-col items-center justify-center min-h-[140px] hover:bg-white/[0.06] transition">
                    <div class="icon-circle w-14 h-14 rounded-full flex items-center justify-center mb-3">
                        <i class="fas fa-camera text-2xl"></i>
                    </div>
                    <span class="font-light text-white" style="letter-spacing: 0.05em;">值日回報</span>
                    <span class="text-xs mt-1" style="color: rgba(255,255,255,0.35);">拍照完成回報</span>
                </a>

                <!-- 換班申請 -->
                <a href="/duty/my/swap" id="link-swap" class="glass rounded-2xl p-5 flex flex-col items-center justify-center min-h-[140px] hover:bg-white/[0.06] transition">
                    <div class="icon-circle w-14 h-14 rounded-full flex items-center justify-center mb-3">
                        <i class="fas fa-exchange-alt text-2xl"></i>
                    </div>
                    <span class="font-light text-white" style="letter-spacing: 0.05em;">換班申請</span>
                    <span class="text-xs mt-1" style="color: rgba(255,255,255,0.35);">與他人交換</span>
                </a>

                <!-- 檢舉回報 -->
                <a href="/duty/my/complaint" id="link-complaint" class="glass rounded-2xl p-5 flex flex-col items-center justify-center min-h-[140px] hover:bg-white/[0.06] transition">
                    <div class="icon-circle w-14 h-14 rounded-full flex items-center justify-center mb-3">
                        <i class="fas fa-flag text-2xl"></i>
                    </div>
                    <span class="font-light text-white" style="letter-spacing: 0.05em;">檢舉回報</span>
                    <span class="text-xs mt-1" style="color: rgba(255,255,255,0.35);">回報問題</span>
                </a>
            </div>

            <!-- 今日值日生 -->
            <div class="glass rounded-2xl p-5">
                <h2 class="text-white font-light mb-3 flex items-center" style="letter-spacing: 0.06em;">
                    <i class="fas fa-users mr-2" style="color: #d4a853;"></i>今日值日生
                </h2>
                <div id="today-duty-list" class="space-y-2">
                    <!-- 動態載入 -->
                </div>
            </div>

            <!-- 我的近期排班 -->
            <div class="glass rounded-2xl p-5">
                <h2 class="text-white font-light mb-3 flex items-center" style="letter-spacing: 0.06em;">
                    <i class="fas fa-calendar-check mr-2" style="color: #d4a853;"></i>我的近期排班
                </h2>
                <div id="my-upcoming-list" class="space-y-2">
                    <!-- 動態載入 -->
                </div>
            </div>

            <!-- 我的記錄 -->
            <a href="/duty/my/history" id="link-history" class="glass rounded-2xl p-4 flex items-center justify-between hover:bg-white/[0.06] transition block">
                <div class="flex items-center gap-3">
                    <div class="icon-circle w-10 h-10 rounded-full flex items-center justify-center">
                        <i class="fas fa-history"></i>
                    </div>
                    <span class="font-light text-white" style="letter-spacing: 0.05em;">我的值日記錄</span>
                </div>
                <i class="fas fa-chevron-right" style="color: rgba(255,255,255,0.25);"></i>
            </a>
        </div>

        <!-- 版權 -->
        <p class="copyright text-center text-sm mt-8 mb-4">
            &copy; <script>document.write(new Date().getFullYear())</script> 寶格教育訓練
        </p>
    </div>

    <script>
        const LIFF_ID = "{{ liff_id }}";
        let currentUser = null;

        // LIFF 初始化
        async function initializeLiff() {
            const loadingSection = document.getElementById('loading-section');
            const mainContent = document.getElementById('main-content');

            try {
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }

                // 取得用戶資料
                const profile = await liff.getProfile();
                currentUser = {
                    lineUserId: profile.userId,
                    displayName: profile.displayName,
                    pictureUrl: profile.pictureUrl
                };

                // 顯示用戶資訊
                document.getElementById('user-name').textContent = profile.displayName;
                if (profile.pictureUrl) {
                    const avatar = document.getElementById('user-avatar');
                    avatar.src = profile.pictureUrl;
                    avatar.classList.remove('hidden');
                }

                // 載入資料
                await loadDutyData();

                // 顯示主內容
                loadingSection.classList.add('hidden');
                mainContent.classList.remove('hidden');

                // 更新連結加上 line_user_id
                updateLinks();

            } catch (error) {
                console.error('LIFF 初始化失敗:', error);
                loadingSection.innerHTML = `
                    <div class="text-center">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-4" style="background: rgba(239,68,68,0.12);">
                            <i class="fas fa-exclamation-triangle text-3xl" style="color: #f87171;"></i>
                        </div>
                        <h2 class="text-xl font-light text-white mb-2" style="letter-spacing: 0.06em;">載入失敗</h2>
                        <p class="mb-4" style="color: rgba(255,255,255,0.35);">${error.message || '請稍後再試'}</p>
                        <button onclick="location.reload()" class="btn-submit px-6 py-3 rounded-xl">
                            重新載入
                        </button>
                    </div>
                `;
            }
        }

        // 更新連結加上 line_user_id 參數
        function updateLinks() {
            if (!currentUser) return;
            const links = ['link-schedule', 'link-report', 'link-swap', 'link-complaint', 'link-history'];
            links.forEach(id => {
                const link = document.getElementById(id);
                if (link) {
                    const url = new URL(link.href, window.location.origin);
                    url.searchParams.set('line_user_id', currentUser.lineUserId);
                    link.href = url.toString();
                }
            });
        }

        // 載入值日資料
        async function loadDutyData() {
            try {
                const response = await fetch(`/api/duty/my-data?line_user_id=${currentUser.lineUserId}`);
                const data = await response.json();

                // 今日是否輪到我值日
                if (data.is_my_duty_today) {
                    document.getElementById('today-duty-alert').classList.remove('hidden');
                }

                // 今日值日生列表
                const todayList = document.getElementById('today-duty-list');
                if (data.today_duty && data.today_duty.length > 0) {
                    todayList.innerHTML = data.today_duty.map(d => `
                        <div class="list-item flex items-center gap-3 p-2">
                            ${d.picture_url
                                ? `<img src="${d.picture_url}" class="w-10 h-10 rounded-full object-cover" style="border: 1px solid rgba(255,255,255,0.1);">`
                                : `<div class="w-10 h-10 icon-circle rounded-full flex items-center justify-center"><i class="fas fa-user" style="color: #d4a853;"></i></div>`
                            }
                            <div>
                                <p class="font-light text-white">${d.display_name}</p>
                                <p class="text-xs" style="color: rgba(255,255,255,0.4);">${d.status_display}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    todayList.innerHTML = '<p class="text-sm" style="color: rgba(255,255,255,0.35);">今日無排班</p>';
                }

                // 我的近期排班
                const upcomingList = document.getElementById('my-upcoming-list');
                if (data.my_upcoming && data.my_upcoming.length > 0) {
                    upcomingList.innerHTML = data.my_upcoming.map(s => `
                        <div class="list-item flex items-center justify-between p-2">
                            <div class="flex items-center gap-3">
                                <div class="date-box w-10 h-10 rounded-lg flex items-center justify-center">
                                    <span class="font-bold">${new Date(s.duty_date).getDate()}</span>
                                </div>
                                <div>
                                    <p class="font-light text-white">${s.duty_date}</p>
                                    <p class="text-xs" style="color: rgba(255,255,255,0.4);">${s.weekday}</p>
                                </div>
                            </div>
                            <span class="px-2 py-1 text-xs rounded-full ${getStatusClass(s.status)}">${s.status_display}</span>
                        </div>
                    `).join('');
                } else {
                    upcomingList.innerHTML = '<p class="text-sm" style="color: rgba(255,255,255,0.35);">目前沒有排班</p>';
                }

            } catch (error) {
                console.error('載入資料失敗:', error);
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'scheduled': return 'badge-scheduled';
                case 'reported': return 'badge-reported';
                case 'approved': return 'badge-approved';
                case 'missed': return 'badge-missed';
                default: return 'badge-default';
            }
        }

        // 初始化
        if (LIFF_ID) {
            initializeLiff();
        } else {
            document.getElementById('loading-section').innerHTML = `
                <div class="text-center">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-4" style="background: rgba(212,168,83,0.12);">
                        <i class="fas fa-cog text-3xl" style="color: #d4a853;"></i>
                    </div>
                    <h2 class="text-xl font-light text-white mb-2" style="letter-spacing: 0.06em;">系統設定中</h2>
                    <p style="color: rgba(255,255,255,0.35);">請聯繫管理員設定 LIFF ID</p>
                </div>
            `;
        }
    </script>
</body>
</html>
