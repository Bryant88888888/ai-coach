<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人事資料填寫 - 寶格教育訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: {
                            400: '#d4a853',
                            500: '#c9952e',
                            600: '#b8841a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        /* 避免 iOS 輸入框放大 */
        input, textarea, select { font-size: 16px !important; }
        select option { background: #1a1a2e; color: #fff; }
        html { scroll-behavior: smooth; }

        body {
            background-color: #08080e;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景光暈 */
        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow-1 {
            width: 400px; height: 400px;
            top: -80px; left: -100px;
            background: radial-gradient(circle, #4c1d95, transparent 70%);
        }
        .bg-glow-2 {
            width: 350px; height: 350px;
            bottom: -60px; right: -80px;
            background: radial-gradient(circle, #1e3a5f, transparent 70%);
        }
        .bg-glow-3 {
            width: 200px; height: 200px;
            top: 40%; left: 60%;
            background: radial-gradient(circle, #c9952e, transparent 70%);
            opacity: 0.08;
        }

        /* 毛玻璃卡片 */
        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* 輸入框樣式 */
        .form-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            color: #fff !important;
            transition: border-color 0.3s, box-shadow 0.3s;
            max-width: 100%;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-input:focus {
            outline: none;
            border-color: #d4a853 !important;
            box-shadow: 0 0 0 2px rgba(212, 168, 83, 0.15) !important;
        }
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25) !important;
        }
        .form-input.border-red-500 {
            border-color: rgba(239, 68, 68, 0.6) !important;
        }

        /* 分隔線 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }

        /* 標題樣式 */
        .page-title {
            letter-spacing: 0.25em;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
        }
        .page-subtitle {
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.75rem;
        }

        /* label 樣式 */
        .field-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            letter-spacing: 0.06em;
        }

        /* Tab 樣式 */
        .tab-btn {
            position: relative;
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.3s;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: #d4a853;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        .tab-btn.active {
            color: #d4a853;
        }
        .tab-btn.active::after {
            width: 100%;
        }

        /* 送出按鈕 */
        .btn-submit {
            background: linear-gradient(135deg, #c9952e, #d4a853);
            color: #08080e;
            font-weight: 700;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-submit::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s;
        }
        .btn-submit:hover::after {
            left: 120%;
        }
        .btn-submit:hover {
            box-shadow: 0 4px 24px rgba(201, 149, 46, 0.25);
        }
        .btn-submit:active {
            transform: scale(0.98);
        }

        /* 段落標題 */
        .section-label {
            color: rgba(212, 168, 83, 0.6);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* 提示文字 */
        .hint-text {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.75rem;
        }
    </style>
</head>
<body class="p-4">
    <!-- 背景光暈 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <div class="max-w-md mx-auto relative z-10">

        <!-- 頂部標題 -->
        <div class="py-6 flex items-center justify-between">
            <div>
                <p class="page-subtitle mb-1">PERSONNEL FORM</p>
                <h1 class="text-xl page-title">人 事 資 料</h1>
            </div>
            <div id="user-info" class="flex items-center gap-2">
                <img id="user-avatar" src="" alt="" class="w-8 h-8 rounded-full hidden" style="border: 1px solid rgba(255,255,255,0.1);">
                <span id="user-name" class="text-sm" style="color: rgba(255,255,255,0.4);"></span>
            </div>
        </div>

        <!-- 載入中 -->
        <div id="loading-section" class="glass rounded-2xl p-10 text-center">
            <div class="inline-flex items-center justify-center w-14 h-14 mb-5">
                <i class="fas fa-spinner fa-spin text-2xl" style="color: #d4a853;"></i>
            </div>
            <p style="color: rgba(255,255,255,0.35); letter-spacing: 0.08em;" class="text-sm">正在載入...</p>
        </div>

        <!-- 主要內容 -->
        <div id="main-content" class="hidden space-y-4">
            <!-- 提醒區塊 -->
            <div id="warning-block" class="glass rounded-xl p-4" style="border-color: rgba(212, 168, 83, 0.15);">
                <div class="flex items-start gap-3">
                    <div class="rounded-full p-2 mt-0.5 shrink-0" style="background: rgba(212, 168, 83, 0.1);">
                        <i class="fas fa-exclamation-triangle text-xs" style="color: #d4a853;"></i>
                    </div>
                    <div class="text-sm">
                        <p class="font-medium mb-1" style="color: rgba(212, 168, 83, 0.8); font-size: 0.8rem;">填寫注意事項</p>
                        <ul class="space-y-0.5" style="color: rgba(255,255,255,0.35); font-size: 0.75rem;">
                            <li>請仔細核對每一項資料，確認無誤再送出</li>
                            <li>姓名、身分證字號請特別留意，<b style="color: rgba(255,255,255,0.5);">避免打錯字</b></li>
                            <li>送出後如需修改請聯繫管理人員</li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 類別切換 Tab -->
            <div id="tab-bar" class="glass rounded-xl overflow-hidden">
                <div class="flex">
                    <button type="button" data-tab="pr"
                        class="tab-btn active flex-1 py-3.5 text-center text-xs font-medium min-h-[48px]" style="letter-spacing: 0.08em;">
                        公關版本
                    </button>
                    <button type="button" data-tab="agent"
                        class="tab-btn flex-1 py-3.5 text-center text-xs font-medium min-h-[48px]" style="letter-spacing: 0.08em;">
                        經紀人版本
                    </button>
                    <button type="button" data-tab="transfer"
                        class="tab-btn flex-1 py-3.5 text-center text-xs font-medium min-h-[48px]" style="letter-spacing: 0.08em;">
                        異動資料
                    </button>
                </div>
            </div>

            <!-- ===== 公關版本 ===== -->
            <form id="form-pr" class="tab-content glass rounded-2xl p-5 space-y-5" novalidate>
                <input type="hidden" name="form_type" value="公關版本">

                <div>
                    <label class="field-label block mb-1.5">本名 <span style="color: #d4a853;">*</span></label>
                    <input type="text" name="real_name" required maxlength="20" placeholder="請輸入真實姓名"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">身分證字號 <span style="color: #d4a853;">*</span></label>
                    <input type="text" name="id_number" required maxlength="10" placeholder="例：A123456789" autocapitalize="characters"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px] uppercase tracking-wider">
                    <p class="hint-text mt-1">1 個英文字母 + 9 位數字，英文自動轉大寫</p>
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">出生日期 <span style="color: #d4a853;">*</span></label>
                    <input type="date" name="birth_roc" required max="{{ today_date }}" min="1930-01-01"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">藝名 <span style="color: #d4a853;">*</span></label>
                    <input type="text" name="stage_name" required maxlength="20" placeholder="請輸入藝名"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">經紀人</label>
                    <input type="text" name="manager" readonly
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]" style="opacity: 0.7; cursor: not-allowed;"
                        id="pr-manager-field">
                    <p class="hint-text mt-1">自動帶入您的暱稱，無法手動修改</p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">店家 <span style="color: #d4a853;">*</span></label>
                    <input type="text" name="store" required maxlength="30" placeholder="請輸入所屬店家名稱"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">狀況 <span style="color: #d4a853;">*</span></label>
                    <select name="status" required
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                        <option value="" disabled selected style="color: rgba(255,255,255,0.25);">請選擇狀況</option>
                        <option value="白紙">白紙</option>
                        <option value="合約">合約</option>
                    </select>
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">備註</label>
                    <textarea name="note" maxlength="200" rows="3" placeholder="選填"
                        class="form-input w-full px-4 py-3 rounded-lg resize-none"></textarea>
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">IG <span style="color: #d4a853;">*</span></label>
                    <input type="text" name="ig" required maxlength="50" placeholder="例：@username"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    <p class="hint-text mt-1">Instagram 帳號</p>
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="btn-submit w-full py-3.5 px-6 rounded-xl min-h-[52px] text-base" style="letter-spacing: 0.12em;">
                        確認送出
                    </button>
                </div>
            </form>

            <!-- ===== 經紀人版本 ===== -->
            <form id="form-agent" class="tab-content glass rounded-2xl p-5 space-y-5 hidden" novalidate>
                <input type="hidden" name="form_type" value="經紀人版本">

                <div>
                    <label class="field-label block mb-1.5">本名 <span style="color: #d4a853;">*</span></label>
                    <input type="text" name="real_name" required maxlength="20" placeholder="請輸入真實姓名"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">身分證字號 <span style="color: #d4a853;">*</span></label>
                    <input type="text" name="id_number" required maxlength="10" placeholder="例：A123456789" autocapitalize="characters"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px] uppercase tracking-wider">
                    <p class="hint-text mt-1">1 個英文字母 + 9 位數字，英文自動轉大寫</p>
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">出生日期 <span style="color: #d4a853;">*</span></label>
                    <input type="date" name="birth_roc" required max="{{ today_date }}" min="1930-01-01"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">暱稱 <span style="color: #d4a853;">*</span></label>
                    <input type="text" name="nickname" required maxlength="20" placeholder="請輸入暱稱"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">職稱位階 <span style="color: #d4a853;">*</span></label>
                    <select name="job_title" required
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                        <option value="" disabled selected style="color: rgba(255,255,255,0.25);">請選擇位階</option>
                        <option value="兼職">兼職</option>
                        <option value="正職試用">正職試用</option>
                        <option value="正式正職">正式正職</option>
                    </select>
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">組長 <span style="color: #d4a853;">*</span></label>
                    <input type="text" name="team_leader" required maxlength="20" placeholder="請輸入組長姓名"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">狀況 <span style="color: #d4a853;">*</span></label>
                    <input type="text" name="status" required maxlength="50" placeholder="請填寫目前狀況"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">備註</label>
                    <textarea name="note" maxlength="200" rows="3" placeholder="選填"
                        class="form-input w-full px-4 py-3 rounded-lg resize-none"></textarea>
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="btn-submit w-full py-3.5 px-6 rounded-xl min-h-[52px] text-base" style="letter-spacing: 0.12em;">
                        確認送出
                    </button>
                </div>
            </form>

            <!-- ===== 異動資料 ===== -->
            <form id="form-transfer" class="tab-content glass rounded-2xl p-5 space-y-5 hidden" novalidate>
                <input type="hidden" name="form_type" value="異動資料">

                <!-- 原資料 -->
                <div class="pb-4" style="border-bottom: 1px solid rgba(255,255,255,0.06);">
                    <p class="section-label mb-4">原資料</p>
                    <div class="space-y-5">
                        <div>
                            <label class="field-label block mb-1.5">原店家 <span style="color: #d4a853;">*</span></label>
                            <input type="text" name="old_store" required maxlength="30" placeholder="請輸入原店家名稱"
                                class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                            <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                        </div>
                        <div>
                            <label class="field-label block mb-1.5">原藝名 <span style="color: #d4a853;">*</span></label>
                            <input type="text" name="old_stage_name" required maxlength="20" placeholder="請輸入原藝名"
                                class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                            <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                        </div>
                        <div>
                            <label class="field-label block mb-1.5">原經紀人 <span style="color: #d4a853;">*</span></label>
                            <input type="text" name="old_manager" required maxlength="20" placeholder="請輸入原經紀人姓名"
                                class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                            <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                        </div>
                    </div>
                </div>

                <!-- 新資料 -->
                <div class="pb-4" style="border-bottom: 1px solid rgba(255,255,255,0.06);">
                    <p class="section-label mb-4">新資料</p>
                    <div class="space-y-5">
                        <div>
                            <label class="field-label block mb-1.5">新店家 <span style="color: #d4a853;">*</span></label>
                            <input type="text" name="new_store" required maxlength="30" placeholder="請輸入新店家名稱"
                                class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                            <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                        </div>
                        <div>
                            <label class="field-label block mb-1.5">新藝名 <span style="color: #d4a853;">*</span></label>
                            <input type="text" name="new_stage_name" required maxlength="20" placeholder="請輸入新藝名"
                                class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                            <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                        </div>
                        <div>
                            <label class="field-label block mb-1.5">新經紀人 <span style="color: #d4a853;">*</span></label>
                            <input type="text" name="new_manager" required maxlength="20" placeholder="請輸入新經紀人姓名"
                                class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                            <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="field-label block mb-1.5">狀況 <span style="color: #d4a853;">*</span></label>
                    <input type="text" name="status" required maxlength="50" placeholder="請填寫異動狀況，例如：白紙"
                        class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="divider"></div>

                <div>
                    <label class="field-label block mb-1.5">備註</label>
                    <textarea name="note" maxlength="200" rows="3" placeholder="選填"
                        class="form-input w-full px-4 py-3 rounded-lg resize-none"></textarea>
                    <p class="field-error text-red-400 text-xs mt-1 hidden"></p>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="btn-submit w-full py-3.5 px-6 rounded-xl min-h-[52px] text-base" style="letter-spacing: 0.12em;">
                        確認送出
                    </button>
                </div>
            </form>

            <!-- 送出成功 -->
            <div id="success-msg" class="hidden glass rounded-2xl p-8 text-center">
                <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-5" style="background: rgba(212, 168, 83, 0.1); border: 1px solid rgba(212, 168, 83, 0.3);">
                    <i class="fas fa-check text-2xl" style="color: #d4a853;"></i>
                </div>
                <h2 class="text-xl font-light text-white mb-2" style="letter-spacing: 0.1em;">資料已送出</h2>
                <p class="text-sm mb-4" style="color: rgba(255,255,255,0.35);">感謝您的填寫，資料已成功送出。</p>

                <!-- 合約簽署區塊 -->
                <div id="signing-section" class="hidden mb-6">
                    <div class="divider mb-4"></div>
                    <p class="text-sm mb-3" style="color: rgba(212, 168, 83, 0.8);">
                        <i class="fas fa-file-signature mr-1"></i>請依序完成以下文件簽署
                    </p>
                    <div id="signing-links" class="space-y-3">
                        <!-- JS 動態填入 -->
                    </div>
                </div>

                <button type="button" id="btn-close-liff"
                    class="btn-submit py-3 px-8 rounded-xl min-h-[48px] text-sm" style="letter-spacing: 0.1em;">
                    關閉
                </button>
            </div>
        </div>

        <!-- 版權 -->
        <p class="text-center text-sm mt-10" style="color: rgba(255,255,255,0.15); letter-spacing: 0.1em;">
            &copy; <script>document.write(new Date().getFullYear())</script> 寶格教育訓練
        </p>
    </div>

<script>
(function() {
    const LIFF_ID = '{{ liff_id }}';
    let lineUserId = null;

    // ===== LIFF 初始化 =====
    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });

            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            const profile = await liff.getProfile();
            lineUserId = profile.userId;

            // 顯示用戶資訊
            const avatar = document.getElementById('user-avatar');
            const name = document.getElementById('user-name');
            if (profile.pictureUrl) {
                avatar.src = profile.pictureUrl;
                avatar.classList.remove('hidden');
            }
            name.textContent = profile.displayName;

            // 檢查是否已註冊員工
            try {
                const profileResp = await fetch('/api/profile?line_user_id=' + profile.userId);
                const profileData = await profileResp.json();

                if (!profileData.success || !profileData.registered) {
                    // 未註冊員工，不允許填寫
                    document.getElementById('loading-section').innerHTML = `
                        <div class="text-center">
                            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full mb-4" style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);">
                                <i class="fas fa-user-slash text-xl text-red-400"></i>
                            </div>
                            <h2 class="text-lg font-light text-white mb-2" style="letter-spacing: 0.1em;">無法填寫</h2>
                            <p style="color: rgba(255,255,255,0.35);" class="text-sm mb-2">您尚未完成員工資料註冊</p>
                            <p style="color: rgba(255,255,255,0.25);" class="text-xs">請先完成員工資料填寫後再使用此表單</p>
                        </div>
                    `;
                    return;
                }

                // 已註冊 → 自動帶入暱稱到公關版本的經紀人欄位
                const managerField = document.getElementById('pr-manager-field');
                if (managerField && profileData.nickname) {
                    managerField.value = profileData.nickname;
                }
            } catch (profileErr) {
                console.error('檢查員工資料失敗:', profileErr);
            }

            // 隱藏載入、顯示主內容
            document.getElementById('loading-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        } catch (err) {
            console.error('LIFF init error:', err);
            // 非 LIFF 環境也顯示表單（方便開發測試）
            document.getElementById('loading-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        }
    }

    initLiff();

    // ===== Tab 切換 =====
    const tabMap = { pr: 'form-pr', agent: 'form-agent', transfer: 'form-transfer' };

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active');
            });
            this.classList.add('active');

            document.querySelectorAll('.tab-content').forEach(f => f.classList.add('hidden'));
            document.getElementById(tabMap[this.dataset.tab]).classList.remove('hidden');
            clearAllErrors();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    });

    // ===== 驗證 =====
    function validateTWID(id) {
        if (!id) return '請輸入身分證字號';
        id = id.toUpperCase();
        if (!/^[A-Z]\d{9}$/.test(id)) return '格式錯誤：需 1 個英文字母 + 9 位數字';
        const m = {A:10,B:11,C:12,D:13,E:14,F:15,G:16,H:17,I:34,J:18,K:19,L:20,M:21,N:22,O:35,P:23,Q:24,R:25,S:26,T:27,U:28,V:29,W:32,X:30,Y:31,Z:33};
        const n1 = m[id[0]];
        if (n1 === undefined) return '首碼英文字母不正確';
        let sum = Math.floor(n1/10) + (n1%10)*9;
        const w = [8,7,6,5,4,3,2,1,1];
        for (let i=0; i<9; i++) sum += parseInt(id[i+1]) * w[i];
        if (sum % 10 !== 0) return '身分證字號驗證不通過，請確認是否輸入正確';
        return '';
    }

    function validateBirthROC(val) {
        if (!val) return '請選擇出生日期';
        // type="date" 回傳 YYYY-MM-DD 格式
        const d = new Date(val);
        if (isNaN(d.getTime())) return '日期格式錯誤';
        if (d > new Date()) return '出生日期不能是未來';
        if (d.getFullYear() < 1930) return '日期不合理';
        return '';
    }

    function validateRequired(val, label) {
        if (!val || !val.trim()) return '請輸入' + label;
        return '';
    }

    function showError(input, msg) {
        const el = input.closest('div').querySelector('.field-error');
        if (el) { el.textContent = msg; el.classList.remove('hidden'); }
        input.style.borderColor = 'rgba(239, 68, 68, 0.6)';
    }

    function clearError(input) {
        const el = input.closest('div').querySelector('.field-error');
        if (el) { el.textContent = ''; el.classList.add('hidden'); }
        input.style.borderColor = 'rgba(255, 255, 255, 0.12)';
    }

    function clearAllErrors() {
        document.querySelectorAll('.field-error').forEach(e => { e.textContent=''; e.classList.add('hidden'); });
        document.querySelectorAll('.form-input').forEach(i => {
            i.style.borderColor = 'rgba(255, 255, 255, 0.12)';
        });
    }

    function validateField(input) {
        const name = input.name, val = input.value;
        let err = '';
        // 非必填欄位（沒有 required 屬性）跳過驗證
        if (!input.hasAttribute('required')) { clearError(input); return true; }
        if (name === 'id_number') err = validateTWID(val);
        else if (name === 'birth_roc') err = validateBirthROC(val);
        else {
            const lbl = input.closest('div').querySelector('label');
            err = validateRequired(val, lbl ? lbl.textContent.replace('*','').trim() : '此欄位');
        }
        if (err) { showError(input, err); return false; }
        clearError(input); return true;
    }

    // 即時驗證
    document.querySelectorAll('.form-input').forEach(input => {
        input.addEventListener('blur', function() { validateField(this); });
        input.addEventListener('input', function() { clearError(this); });
    });

    // 身分證自動轉大寫
    document.querySelectorAll('input[name="id_number"]').forEach(input => {
        input.addEventListener('input', function() { this.value = this.value.toUpperCase(); });
    });

    // ===== 送出 =====
    document.querySelectorAll('form.tab-content').forEach(form => {
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            let valid = true, first = null;
            this.querySelectorAll('.form-input').forEach(input => {
                if (!validateField(input)) { valid = false; if (!first) first = input; }
            });
            if (!valid) { first.focus(); first.scrollIntoView({ behavior:'smooth', block:'center' }); return; }

            const data = {};
            new FormData(this).forEach((v,k) => { data[k] = v; });
            if (lineUserId) data.line_user_id = lineUserId;
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>送出中...';

            try {
                const resp = await fetch('/api/info-form', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await resp.json();

                if (result.success) {
                    document.querySelectorAll('.tab-content').forEach(f => f.classList.add('hidden'));
                    document.getElementById('warning-block').classList.add('hidden');
                    document.getElementById('tab-bar').classList.add('hidden');
                    document.getElementById('success-msg').classList.remove('hidden');

                    // 顯示簽署連結（多份）
                    if (result.signing_tasks && result.signing_tasks.length > 0) {
                        const container = document.getElementById('signing-links');
                        container.innerHTML = result.signing_tasks.map((task, i) => `
                            <a href="${task.url}" target="_blank"
                                class="flex items-center justify-between w-full px-5 py-3 rounded-xl min-h-[48px] text-sm font-bold transition"
                                style="background: linear-gradient(135deg, #10b981, #059669); color: white;">
                                <span><i class="fas fa-file-signature mr-2"></i>${task.name}</span>
                                <i class="fas fa-external-link-alt text-xs" style="opacity:0.7;"></i>
                            </a>
                        `).join('');
                        document.getElementById('signing-section').classList.remove('hidden');
                    }
                } else {
                    alert(result.error || '送出失敗，請重試');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '確認送出';
                }
            } catch (err) {
                alert('網路錯誤，請重試');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '確認送出';
            }
        });
    });

    // 關閉按鈕
    document.getElementById('btn-close-liff').addEventListener('click', function() {
        if (liff.isInClient()) {
            liff.closeWindow();
        } else {
            location.reload();
        }
    });
})();
</script>
</body>
</html>
