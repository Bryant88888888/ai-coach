<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工資料 - 寶格教育訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: {
                            400: '#d4a853',
                            500: '#c9952e',
                            600: '#b8841a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: #08080e;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景光暈 */
        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow-1 {
            width: 400px; height: 400px;
            top: -80px; left: -100px;
            background: radial-gradient(circle, #4c1d95, transparent 70%);
        }
        .bg-glow-2 {
            width: 350px; height: 350px;
            bottom: -60px; right: -80px;
            background: radial-gradient(circle, #1e3a5f, transparent 70%);
        }
        .bg-glow-3 {
            width: 200px; height: 200px;
            top: 40%; left: 60%;
            background: radial-gradient(circle, #c9952e, transparent 70%);
            opacity: 0.08;
        }

        /* 毛玻璃卡片 */
        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* 輸入框樣式 */
        .form-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            transition: border-color 0.3s, box-shadow 0.3s;
            max-width: 100%;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-input:focus {
            outline: none;
            border-color: #d4a853;
            box-shadow: 0 0 0 2px rgba(212, 168, 83, 0.15);
        }
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        /* 分隔線 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }

        /* 標題樣式 */
        .page-title {
            letter-spacing: 0.25em;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
        }
        .page-subtitle {
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.75rem;
        }

        /* label 樣式 */
        .field-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            letter-spacing: 0.06em;
        }

        /* 送出按鈕 */
        .btn-submit {
            background: linear-gradient(135deg, #c9952e, #d4a853);
            color: #08080e;
            font-weight: 700;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-submit::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s;
        }
        .btn-submit:hover::after {
            left: 120%;
        }
        .btn-submit:hover {
            box-shadow: 0 4px 24px rgba(201, 149, 46, 0.25);
        }
        .btn-submit:active {
            transform: scale(0.95);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="p-4">
    <!-- 背景光暈 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <div class="max-w-md mx-auto py-8 relative z-10">
        <!-- 標題 -->
        <div class="text-center mb-10">
            <p class="page-subtitle mb-2">EMPLOYEE PROFILE</p>
            <h1 class="text-2xl page-title">員 工 資 料</h1>
            <p class="mt-2" style="color: rgba(255,255,255,0.25); font-size: 0.8rem; letter-spacing: 0.06em;">請填寫您的基本資料</p>
        </div>

        <!-- 載入中 -->
        <div id="loading-section" class="glass rounded-2xl p-10 text-center">
            <div class="inline-flex items-center justify-center w-14 h-14 mb-5">
                <i class="fas fa-spinner fa-spin text-2xl" style="color: #d4a853;"></i>
            </div>
            <p style="color: rgba(255,255,255,0.35); letter-spacing: 0.08em;" class="text-sm">正在載入...</p>
        </div>

        <!-- 已填寫過（唯讀顯示） -->
        <div id="readonly-section" class="hidden space-y-4">
            <!-- LINE 資訊 -->
            <div class="glass rounded-2xl p-5">
                <div class="flex items-center gap-4">
                    <img id="readonly-avatar" src="" class="w-14 h-14 rounded-full object-cover" style="border: 1px solid rgba(255,255,255,0.1);">
                    <div>
                        <p id="readonly-line-name" class="font-light text-white text-lg" style="letter-spacing: 0.05em;"></p>
                        <p class="text-xs" style="color: rgba(255,255,255,0.25);">LINE 帳號</p>
                    </div>
                </div>
            </div>

            <div class="glass rounded-2xl p-5 space-y-5">
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-5 h-5 rounded-full flex items-center justify-center" style="background: rgba(212, 168, 83, 0.15);">
                        <i class="fas fa-check text-xs" style="color: #d4a853;"></i>
                    </div>
                    <span class="text-xs" style="color: rgba(212, 168, 83, 0.7); letter-spacing: 0.06em;">資料已填寫完成</span>
                </div>

                <div>
                    <p class="field-label mb-1">真實姓名</p>
                    <p id="readonly-real-name" class="text-white font-light text-lg"></p>
                </div>
                <div class="divider"></div>
                <div>
                    <p class="field-label mb-1">手機號碼</p>
                    <p id="readonly-phone" class="text-white font-light text-lg"></p>
                </div>
                <div class="divider"></div>
                <div>
                    <p class="field-label mb-1">暱稱（綽號）</p>
                    <p id="readonly-nickname" class="text-white font-light text-lg"></p>
                </div>
            </div>
        </div>

        <!-- 表單 -->
        <div id="form-section" class="hidden space-y-4">
            <!-- LINE 資訊 -->
            <div class="glass rounded-2xl p-5">
                <div class="flex items-center gap-4">
                    <img id="line-avatar" src="" class="w-14 h-14 rounded-full object-cover" style="border: 1px solid rgba(255,255,255,0.1);">
                    <div>
                        <p id="line-name" class="font-light text-white text-lg" style="letter-spacing: 0.05em;"></p>
                        <p class="text-xs" style="color: rgba(255,255,255,0.25);">LINE 帳號</p>
                    </div>
                </div>
            </div>

            <form id="profile-form">
                <input type="hidden" id="line_user_id" name="line_user_id">
                <input type="hidden" id="line_display_name" name="line_display_name">

                <div class="glass rounded-2xl p-6 space-y-6">
                    <!-- 真實姓名 -->
                    <div>
                        <label class="field-label block mb-2">
                            真實姓名 <span style="color: #d4a853;">*</span>
                        </label>
                        <input type="text" id="real_name" name="real_name" required placeholder="請輸入您的真實姓名"
                            class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    </div>

                    <div class="divider"></div>

                    <!-- 電話 -->
                    <div>
                        <label class="field-label block mb-2">
                            手機號碼 <span style="color: #d4a853;">*</span>
                        </label>
                        <input type="tel" id="phone" name="phone" required placeholder="0912345678"
                            class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    </div>

                    <div class="divider"></div>

                    <!-- 暱稱 -->
                    <div>
                        <label class="field-label block mb-2">
                            暱稱（綽號） <span style="color: #d4a853;">*</span>
                        </label>
                        <input type="text" id="nickname" name="nickname" required placeholder="請輸入您的暱稱"
                            class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]">
                    </div>
                </div>

                <!-- 送出按鈕 -->
                <button type="submit" id="submit-btn"
                    class="btn-submit w-full py-4 px-6 rounded-xl mt-6 flex items-center justify-center min-h-[56px] text-base"
                    style="letter-spacing: 0.15em;">
                    <i class="fas fa-save mr-3 text-sm"></i>儲存資料
                </button>
            </form>
        </div>

        <!-- 版權 -->
        <p class="text-center text-sm mt-10" style="color: rgba(255,255,255,0.15); letter-spacing: 0.1em;">
            &copy; <script>document.write(new Date().getFullYear())</script> 寶格教育訓練
        </p>
    </div>

    <!-- 主題切換 -->
    <button id="theme-toggle"
        class="fixed bottom-4 right-4 p-3 glass rounded-full min-w-[44px] min-h-[44px] transition-transform duration-100 active:scale-90"
        style="touch-action: manipulation; -webkit-tap-highlight-color: transparent;">
        <i class="fas fa-moon text-gray-500"></i>
    </button>

    <script>
        const LIFF_ID = "{{ liff_id }}";
        let currentUser = null;

        // 主題切換
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });

        // LIFF 初始化
        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }

                const profile = await liff.getProfile();
                currentUser = {
                    lineUserId: profile.userId,
                    displayName: profile.displayName,
                    pictureUrl: profile.pictureUrl
                };

                // 顯示 LINE 資訊
                document.getElementById('line_user_id').value = profile.userId;
                document.getElementById('line_display_name').value = profile.displayName;
                document.getElementById('line-name').textContent = profile.displayName;
                document.getElementById('line-avatar').src = profile.pictureUrl || '/static/default-avatar.png';

                // 載入現有資料並判斷是否已註冊
                const isRegistered = await loadExistingData();

                document.getElementById('loading-section').classList.add('hidden');
                if (isRegistered) {
                    document.getElementById('readonly-avatar').src = profile.pictureUrl || '/static/default-avatar.png';
                    document.getElementById('readonly-line-name').textContent = profile.displayName;
                    document.getElementById('readonly-section').classList.remove('hidden');
                } else {
                    document.getElementById('form-section').classList.remove('hidden');
                }

            } catch (error) {
                console.error('LIFF 初始化失敗:', error);
                document.getElementById('loading-section').innerHTML = `
                    <div class="text-center">
                        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full mb-4" style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);">
                            <i class="fas fa-exclamation-triangle text-xl text-red-400"></i>
                        </div>
                        <p style="color: rgba(255,255,255,0.4);" class="text-sm mb-2">載入失敗</p>
                        <p class="text-red-400 text-xs mb-5">${error.message || error}</p>
                        <button onclick="location.reload()" class="btn-submit px-6 py-3 rounded-lg text-sm">重試</button>
                    </div>
                `;
            }
        }

        // 載入現有資料，回傳是否已註冊
        async function loadExistingData() {
            try {
                const response = await fetch(`/api/profile?line_user_id=${currentUser.lineUserId}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.registered) {
                        document.getElementById('readonly-real-name').textContent = data.real_name || '';
                        document.getElementById('readonly-phone').textContent = data.phone || '';
                        document.getElementById('readonly-nickname').textContent = data.nickname || '';
                        return true;
                    }
                }
            } catch (error) {
                console.log('無現有資料或載入失敗');
            }
            return false;
        }

        // 表單送出
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>儲存中...';

            const formData = new FormData(e.target);

            try {
                const response = await fetch('/api/profile', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('readonly-avatar').src = currentUser.pictureUrl || '/static/default-avatar.png';
                    document.getElementById('readonly-line-name').textContent = currentUser.displayName;
                    document.getElementById('readonly-real-name').textContent = formData.get('real_name');
                    document.getElementById('readonly-phone').textContent = formData.get('phone');
                    document.getElementById('readonly-nickname').textContent = formData.get('nickname');
                    document.getElementById('form-section').classList.add('hidden');
                    document.getElementById('readonly-section').classList.remove('hidden');
                } else {
                    alert(result.error || '儲存失敗，請重試');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-save mr-3 text-sm"></i>儲存資料';
                }
            } catch (error) {
                alert('網路錯誤，請重試');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save mr-3 text-sm"></i>儲存資料';
            }
        });

        // 初始化
        if (LIFF_ID) {
            initializeLiff();
        } else {
            document.getElementById('loading-section').innerHTML = `
                <div class="text-center">
                    <div class="inline-flex items-center justify-center w-14 h-14 rounded-full mb-4" style="background: rgba(212,168,83,0.1); border: 1px solid rgba(212,168,83,0.3);">
                        <i class="fas fa-cog text-xl" style="color: #d4a853;"></i>
                    </div>
                    <p style="color: rgba(255,255,255,0.4);" class="text-sm">系統設定中，請聯繫管理員</p>
                </div>
            `;
        }
    </script>
</body>
</html>
