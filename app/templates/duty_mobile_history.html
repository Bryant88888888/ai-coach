<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的記錄 - 值日專區</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 400: '#d4a853', 500: '#c9952e', 600: '#b8841a' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/duty-dark.css">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="min-h-screen">
    <!-- 背景光暈 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- 頂部導航 -->
    <div class="nav-glass px-4 py-4 sticky top-0 z-10">
        <div class="flex items-center gap-3 max-w-lg mx-auto">
            <a href="/duty/my" class="btn-back">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-lg font-light text-white" style="letter-spacing: 0.15em;">我 的 記 錄</h1>
        </div>
    </div>

    <div class="max-w-lg mx-auto p-4 relative z-10">
        <!-- 載入中 -->
        <div id="loading-section" class="glass rounded-2xl p-10 text-center">
            <div class="inline-flex items-center justify-center w-14 h-14 mb-5">
                <i class="fas fa-spinner fa-spin text-2xl" style="color: #d4a853;"></i>
            </div>
            <p style="color: rgba(255,255,255,0.35); letter-spacing: 0.08em;" class="text-sm">載入中...</p>
        </div>

        <!-- 主要內容 -->
        <div id="main-content" class="hidden space-y-4">
            <!-- 統計卡片 -->
            <div class="grid grid-cols-2 gap-3">
                <div class="stat-card rounded-xl p-4 text-center">
                    <p class="text-3xl stat-number" id="stat-total">0</p>
                    <p class="text-sm" style="color: rgba(255,255,255,0.4);">總排班次數</p>
                </div>
                <div class="stat-card rounded-xl p-4 text-center">
                    <p class="text-3xl stat-number" id="stat-completed">0</p>
                    <p class="text-sm" style="color: rgba(255,255,255,0.4);">完成次數</p>
                </div>
                <div class="stat-card rounded-xl p-4 text-center">
                    <p class="text-3xl font-bold" id="stat-missed" style="color: #f87171;">0</p>
                    <p class="text-sm" style="color: rgba(255,255,255,0.4);">未完成</p>
                </div>
                <div class="stat-card rounded-xl p-4 text-center">
                    <p class="text-3xl stat-number" id="stat-rate">0%</p>
                    <p class="text-sm" style="color: rgba(255,255,255,0.4);">完成率</p>
                </div>
            </div>

            <!-- 完成率進度條 -->
            <div class="glass rounded-xl p-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="field-label">完成率</span>
                    <span class="text-sm" id="rate-text" style="color: rgba(255,255,255,0.5);">0%</span>
                </div>
                <div class="progress-bar-track w-full rounded-full h-3">
                    <div id="rate-bar" class="progress-bar-fill h-3 rounded-full" style="width: 0%"></div>
                </div>
            </div>

            <!-- 歷史記錄 -->
            <div class="glass rounded-xl overflow-hidden">
                <div class="p-4" style="border-bottom: 1px solid rgba(255,255,255,0.08);">
                    <h2 class="font-light text-white" style="letter-spacing: 0.06em;">
                        <i class="fas fa-history mr-2" style="color: #d4a853;"></i>過去 90 天記錄
                    </h2>
                </div>
                <div id="history-list">
                    <!-- 動態載入 -->
                </div>
                <div id="empty-history" class="hidden p-8 text-center">
                    <i class="fas fa-inbox text-4xl mb-3" style="color: rgba(255,255,255,0.15);"></i>
                    <p style="color: rgba(255,255,255,0.35);">尚無值日記錄</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "{{ liff_id }}";
        let currentUser = null;

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }
                const profile = await liff.getProfile();
                currentUser = { lineUserId: profile.userId };
                await loadHistory();
            } catch (error) {
                document.getElementById('loading-section').innerHTML = `
                    <div class="text-center">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4" style="color: #f87171;"></i>
                        <p style="color: rgba(255,255,255,0.35);">載入失敗</p>
                        <button onclick="location.reload()" class="btn-submit mt-4 px-4 py-2 rounded-lg">重試</button>
                    </div>
                `;
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch(`/duty/my/api/history?line_user_id=${currentUser.lineUserId}`);
                const data = await response.json();

                document.getElementById('loading-section').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');

                // 更新統計
                document.getElementById('stat-total').textContent = data.stats.total;
                document.getElementById('stat-completed').textContent = data.stats.completed;
                document.getElementById('stat-missed').textContent = data.stats.missed;
                document.getElementById('stat-rate').textContent = data.stats.completion_rate + '%';
                document.getElementById('rate-text').textContent = data.stats.completion_rate + '%';
                document.getElementById('rate-bar').style.width = data.stats.completion_rate + '%';

                // 更新進度條顏色
                const rateBar = document.getElementById('rate-bar');
                if (data.stats.completion_rate >= 80) {
                    rateBar.className = 'progress-bar-fill rate-good h-3 rounded-full';
                } else if (data.stats.completion_rate >= 50) {
                    rateBar.className = 'progress-bar-fill rate-warning h-3 rounded-full';
                } else {
                    rateBar.className = 'progress-bar-fill rate-danger h-3 rounded-full';
                }

                // 更新歷史列表
                const historyList = document.getElementById('history-list');
                if (data.history && data.history.length > 0) {
                    historyList.innerHTML = data.history.map(h => `
                        <div class="p-4 flex items-center justify-between" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-lg flex flex-col items-center justify-center ${getStatusBgClass(h.status)}">
                                    <span class="text-sm font-bold">${new Date(h.duty_date).getDate()}</span>
                                </div>
                                <div>
                                    <p class="font-light text-white">${h.duty_date}</p>
                                    <p class="text-xs" style="color: rgba(255,255,255,0.4);">${h.weekday}</p>
                                </div>
                            </div>
                            <span class="px-3 py-1 text-sm rounded-full ${getStatusClass(h.status)}">${h.status_display}</span>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('empty-history').classList.remove('hidden');
                }
            } catch (error) {
                console.error('載入失敗:', error);
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'scheduled': return 'badge-scheduled';
                case 'reported': return 'badge-reported';
                case 'approved': return 'badge-approved';
                case 'missed': return 'badge-missed';
                default: return 'badge-default';
            }
        }

        function getStatusBgClass(status) {
            switch(status) {
                case 'approved': return 'date-box';
                case 'reported': return 'date-box';
                case 'missed': return 'badge-missed';
                default: return 'date-box past';
            }
        }

        if (LIFF_ID) {
            initializeLiff();
        }
    </script>
</body>
</html>
