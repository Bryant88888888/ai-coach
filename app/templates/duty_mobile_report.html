<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>值日回報 - 值日專區</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 400: '#d4a853', 500: '#c9952e', 600: '#b8841a' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/duty-dark.css">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="min-h-screen">
    <!-- 背景光暈 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- 頂部導航 -->
    <div class="nav-glass px-4 py-4 sticky top-0 z-10">
        <div class="flex items-center gap-3 max-w-lg mx-auto">
            <a href="/duty/my" class="btn-back">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-lg font-light text-white" style="letter-spacing: 0.15em;">值 日 回 報</h1>
        </div>
    </div>

    <div class="max-w-lg mx-auto p-4 relative z-10">
        <!-- 載入中 -->
        <div id="loading-section" class="glass rounded-2xl p-10 text-center">
            <div class="inline-flex items-center justify-center w-14 h-14 mb-5">
                <i class="fas fa-spinner fa-spin text-2xl" style="color: #d4a853;"></i>
            </div>
            <p style="color: rgba(255,255,255,0.35); letter-spacing: 0.08em;" class="text-sm">載入中...</p>
        </div>

        <!-- 成功訊息 -->
        <div id="success-section" class="hidden glass rounded-2xl p-8 text-center">
            <div class="success-icon w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-4xl"></i>
            </div>
            <h2 class="text-xl font-light text-white mb-2" style="letter-spacing: 0.06em;">回報成功！</h2>
            <p class="mb-6" style="color: rgba(255,255,255,0.35);">感謝您完成值日工作</p>
            <a href="/duty/my" class="btn-submit inline-block px-6 py-3 rounded-xl">
                返回首頁
            </a>
        </div>

        <!-- 無可回報排班 -->
        <div id="empty-section" class="hidden glass rounded-2xl p-10 text-center">
            <i class="fas fa-calendar-check text-5xl mb-4" style="color: rgba(255,255,255,0.15);"></i>
            <p class="mb-2" style="color: rgba(255,255,255,0.5);">目前沒有需要回報的值日</p>
            <p class="text-sm" style="color: rgba(255,255,255,0.25);">只有今天或昨天的排班可以回報</p>
        </div>

        <!-- 回報表單 -->
        <div id="report-form-section" class="hidden space-y-4">
            <!-- 選擇排班 -->
            <div class="glass rounded-2xl p-5">
                <label class="field-label block mb-3">
                    <i class="fas fa-calendar-day mr-2" style="color: #d4a853;"></i>選擇要回報的值日
                </label>
                <div id="schedule-options" class="space-y-2">
                    <!-- 動態載入 -->
                </div>
            </div>

            <!-- 回報說明 -->
            <div class="glass rounded-2xl p-5">
                <label class="field-label block mb-3">
                    <i class="fas fa-comment mr-2" style="color: #d4a853;"></i>回報說明（選填）
                </label>
                <textarea id="report-text" rows="3" placeholder="描述今天的值日工作..."
                    class="form-input w-full px-4 py-3 rounded-xl"></textarea>
            </div>

            <!-- 照片上傳 -->
            <div class="glass rounded-2xl p-5">
                <label class="field-label block mb-3">
                    <i class="fas fa-camera mr-2" style="color: #d4a853;"></i>上傳照片（選填）
                </label>
                <input type="file" id="photo-input" accept="image/*" capture="environment" class="hidden">
                <label for="photo-input" id="photo-label" class="upload-area flex flex-col items-center justify-center w-full h-40 rounded-xl">
                    <div id="photo-placeholder" class="text-center">
                        <i class="fas fa-camera text-4xl mb-2" style="color: rgba(212,168,83,0.4);"></i>
                        <p style="color: rgba(255,255,255,0.35);">點擊拍照或上傳</p>
                    </div>
                    <div id="photo-preview" class="hidden w-full h-full p-2">
                        <img id="preview-image" class="max-h-32 mx-auto rounded-lg object-contain" src="">
                    </div>
                </label>
            </div>

            <!-- 送出按鈕 -->
            <button id="submit-btn" onclick="submitReport()" class="btn-submit w-full py-4 px-6 rounded-2xl flex items-center justify-center min-h-[60px] text-lg">
                <i class="fas fa-paper-plane mr-2"></i>送出回報
            </button>
        </div>
    </div>

    <script>
        const LIFF_ID = "{{ liff_id }}";
        const preSelectedScheduleId = {{ schedule_id or 'null' }};
        let currentUser = null;
        let selectedScheduleId = preSelectedScheduleId;

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }
                const profile = await liff.getProfile();
                currentUser = { lineUserId: profile.userId };
                await loadReportableSchedules();
            } catch (error) {
                document.getElementById('loading-section').innerHTML = `
                    <div class="text-center">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4" style="color: #f87171;"></i>
                        <p style="color: rgba(255,255,255,0.35);">載入失敗</p>
                        <button onclick="location.reload()" class="btn-submit mt-4 px-4 py-2 rounded-lg">重試</button>
                    </div>
                `;
            }
        }

        async function loadReportableSchedules() {
            try {
                const response = await fetch(`/duty/my/api/reportable?line_user_id=${currentUser.lineUserId}`);
                const data = await response.json();

                document.getElementById('loading-section').classList.add('hidden');

                if (data.schedules && data.schedules.length > 0) {
                    const options = document.getElementById('schedule-options');
                    options.innerHTML = data.schedules.map(s => `
                        <label class="option-card flex items-center gap-3 p-3 rounded-xl">
                            <input type="radio" name="schedule" value="${s.id}" ${s.id == selectedScheduleId || data.schedules.length === 1 ? 'checked' : ''}
                                class="w-5 h-5" onchange="selectedScheduleId = ${s.id}">
                            <div class="flex-1">
                                <p class="font-light text-white">${s.duty_date}</p>
                                <p class="text-sm" style="color: rgba(255,255,255,0.4);">${s.weekday} ${s.is_today ? '（今天）' : '（昨天）'}</p>
                            </div>
                        </label>
                    `).join('');

                    if (data.schedules.length === 1) {
                        selectedScheduleId = data.schedules[0].id;
                    }

                    document.getElementById('report-form-section').classList.remove('hidden');
                } else {
                    document.getElementById('empty-section').classList.remove('hidden');
                }
            } catch (error) {
                console.error('載入失敗:', error);
            }
        }

        // 照片預覽
        document.getElementById('photo-input').addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview-image').src = e.target.result;
                    document.getElementById('photo-placeholder').classList.add('hidden');
                    document.getElementById('photo-preview').classList.remove('hidden');
                };
                reader.readAsDataURL(this.files[0]);
            }
        });

        async function submitReport() {
            if (!selectedScheduleId) {
                alert('請選擇要回報的值日');
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>送出中...';

            const formData = new FormData();
            formData.append('line_user_id', currentUser.lineUserId);
            formData.append('schedule_id', selectedScheduleId);
            formData.append('report_text', document.getElementById('report-text').value);

            const photoInput = document.getElementById('photo-input');
            if (photoInput.files && photoInput.files[0]) {
                formData.append('photo', photoInput.files[0]);
            }

            try {
                const response = await fetch('/duty/my/api/report', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    document.getElementById('report-form-section').classList.add('hidden');
                    document.getElementById('success-section').classList.remove('hidden');
                } else {
                    alert(result.error || '回報失敗，請重試');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>送出回報';
                }
            } catch (error) {
                alert('網路錯誤，請重試');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>送出回報';
            }
        }

        if (LIFF_ID) {
            initializeLiff();
        }
    </script>
</body>
</html>
