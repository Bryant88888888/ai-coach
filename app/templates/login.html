<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 寶格教育訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 400: '#d4a853', 500: '#c9952e', 600: '#b8841a' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% if liff_id %}
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    {% endif %}
    <style>
        body { background-color: #08080e; }
        .bg-glow {
            position: fixed; border-radius: 50%; filter: blur(120px);
            opacity: 0.25; pointer-events: none; z-index: 0;
        }
        .bg-glow-1 { width: 400px; height: 400px; top: -80px; left: -100px; background: radial-gradient(circle, #4c1d95, transparent 70%); }
        .bg-glow-2 { width: 350px; height: 350px; bottom: -60px; right: -80px; background: radial-gradient(circle, #1e3a5f, transparent 70%); }
        .bg-glow-3 { width: 200px; height: 200px; top: 40%; left: 60%; background: radial-gradient(circle, #c9952e, transparent 70%); opacity: 0.08; }
        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-gold {
            background: linear-gradient(135deg, #c9952e, #d4a853);
            color: #08080e; font-weight: 700; transition: all 0.3s;
            position: relative; overflow: hidden;
        }
        .btn-gold::after {
            content: ''; position: absolute; top: -50%; left: -60%;
            width: 40%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-20deg); transition: left 0.6s;
        }
        .btn-gold:hover::after { left: 120%; }
        .btn-gold:hover { box-shadow: 0 4px 24px rgba(201, 149, 46, 0.25); }
        .btn-gold:active { transform: scale(0.95); }
        .btn-gold:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- 背景光暈 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo 區塊 -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-24 h-24 rounded-full shadow-lg mb-4 overflow-hidden" style="border: 1px solid rgba(255,255,255,0.1);">
                <img src="/static/logo.jpg" alt="Logo" class="w-full h-full object-cover">
            </div>
            <h1 class="text-2xl font-light text-white" style="letter-spacing: 0.25em;">寶 格 教 育 訓 練</h1>
            <p class="mt-2 text-sm" style="color: rgba(255,255,255,0.35); letter-spacing: 0.12em;">MANAGEMENT SYSTEM</p>
        </div>

        <!-- 錯誤訊息 -->
        {% set error_msg = error or request.query_params.get('error') %}
        {% if error_msg %}
        <div class="glass rounded-xl px-4 py-3 mb-6 flex items-center" style="border-color: rgba(239,68,68,0.3);">
            <i class="fas fa-exclamation-circle mr-2" style="color: #f87171;"></i>
            <span style="color: rgba(255,255,255,0.8);">{{ error_msg }}</span>
        </div>
        {% endif %}

        {% if liff_id %}
        <!-- LINE 自動登入 -->
        <div id="liff-login-section" class="glass rounded-2xl p-8 text-center">
            <div id="liff-loading">
                <div class="inline-flex items-center justify-center w-14 h-14 mb-5">
                    <i class="fas fa-spinner fa-spin text-2xl" style="color: #d4a853;"></i>
                </div>
                <p class="text-sm" style="color: rgba(255,255,255,0.5); letter-spacing: 0.08em;">正在透過 LINE 驗證身份...</p>
            </div>
            <div id="liff-error" class="hidden">
                <div class="inline-flex items-center justify-center w-14 h-14 mb-5 rounded-full" style="background: rgba(239,68,68,0.12);">
                    <i class="fas fa-exclamation-triangle text-xl" style="color: #f87171;"></i>
                </div>
                <p class="mb-4" style="color: rgba(255,255,255,0.5);" id="liff-error-msg">LINE 驗證失敗</p>
                <button onclick="location.reload()" class="btn-gold px-6 py-3 rounded-xl">
                    <i class="fas fa-redo mr-2"></i>重新驗證
                </button>
            </div>
        </div>

        <!-- 隱藏的表單，由 JS 自動提交 -->
        <form id="line-login-form" method="POST" action="/login" class="hidden">
            <input type="hidden" name="line_user_id" id="line_user_id">
        </form>

        <script>
            const LIFF_ID = "{{ liff_id }}";

            async function initLiffLogin() {
                try {
                    await liff.init({ liffId: LIFF_ID });

                    if (!liff.isLoggedIn()) {
                        liff.login({ redirectUri: window.location.href });
                        return;
                    }

                    const profile = await liff.getProfile();
                    document.getElementById('line_user_id').value = profile.userId;
                    document.getElementById('line-login-form').submit();

                } catch (error) {
                    console.error('LIFF 初始化失敗:', error);
                    document.getElementById('liff-loading').classList.add('hidden');
                    document.getElementById('liff-error').classList.remove('hidden');
                    document.getElementById('liff-error-msg').textContent = error.message || 'LINE 驗證失敗，請重試';
                }
            }

            if (LIFF_ID) {
                initLiffLogin();
            }
        </script>

        {% else %}
        <!-- 傳統帳密登入（未設定 LIFF ID 時） -->
        <div class="glass rounded-2xl p-8">
            <form method="POST" action="/login" class="space-y-6">
                <div>
                    <label class="block text-sm mb-2" style="color: rgba(255,255,255,0.5); letter-spacing: 0.06em;">
                        <i class="fas fa-user mr-2" style="color: #d4a853;"></i>帳號
                    </label>
                    <input type="text" name="username" required autocomplete="username"
                        class="w-full px-4 py-3 rounded-xl min-h-[48px]"
                        style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #fff;"
                        placeholder="請輸入帳號">
                </div>
                <div>
                    <label class="block text-sm mb-2" style="color: rgba(255,255,255,0.5); letter-spacing: 0.06em;">
                        <i class="fas fa-lock mr-2" style="color: #d4a853;"></i>密碼
                    </label>
                    <input type="password" name="password" required autocomplete="current-password"
                        class="w-full px-4 py-3 rounded-xl min-h-[48px]"
                        style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #fff;"
                        placeholder="請輸入密碼">
                </div>
                <button type="submit" class="btn-gold w-full py-3 px-4 rounded-xl min-h-[48px] flex items-center justify-center text-lg">
                    <i class="fas fa-sign-in-alt mr-2"></i>登入
                </button>
            </form>
        </div>
        {% endif %}

        <!-- 版權 -->
        <p class="text-center text-sm mt-8" style="color: rgba(255,255,255,0.15);">
            &copy; <script>document.write(new Date().getFullYear())</script> 寶格教育訓練
        </p>
    </div>
</body>
</html>
