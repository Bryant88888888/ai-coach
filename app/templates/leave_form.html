<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>請假申請 - 寶格教育訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: {
                            400: '#d4a853',
                            500: '#c9952e',
                            600: '#b8841a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: #08080e;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景光暈 */
        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow-1 {
            width: 400px; height: 400px;
            top: -80px; left: -100px;
            background: radial-gradient(circle, #4c1d95, transparent 70%);
        }
        .bg-glow-2 {
            width: 350px; height: 350px;
            bottom: -60px; right: -80px;
            background: radial-gradient(circle, #1e3a5f, transparent 70%);
        }
        .bg-glow-3 {
            width: 200px; height: 200px;
            top: 40%; left: 60%;
            background: radial-gradient(circle, #c9952e, transparent 70%);
            opacity: 0.08;
        }

        /* 毛玻璃卡片 */
        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* 輸入框樣式 */
        .form-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            transition: border-color 0.3s, box-shadow 0.3s;
            max-width: 100%;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-input:focus {
            outline: none;
            border-color: #d4a853;
            box-shadow: 0 0 0 2px rgba(212, 168, 83, 0.15);
        }
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* date input 修正 */
        input[type="date"] {
            -webkit-appearance: none;
            appearance: none;
            max-width: 100%;
            box-sizing: border-box;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.7);
            cursor: pointer;
        }

        /* 選擇卡片 */
        .type-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .type-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }
        .peer:checked ~ .type-card {
            border-color: #d4a853;
            background: rgba(212, 168, 83, 0.08);
            box-shadow: 0 0 20px rgba(212, 168, 83, 0.06);
        }
        .peer:checked ~ .type-card .type-icon {
            color: #d4a853;
        }
        .peer:checked ~ .type-card .type-label {
            color: #d4a853;
        }

        /* 送出按鈕 */
        .btn-submit {
            background: linear-gradient(135deg, #c9952e, #d4a853);
            color: #08080e;
            font-weight: 700;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-submit::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s;
        }
        .btn-submit:hover::after {
            left: 120%;
        }
        .btn-submit:hover {
            box-shadow: 0 4px 24px rgba(201, 149, 46, 0.25);
        }

        /* 上傳區域 */
        .upload-zone {
            border: 1px dashed rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s;
        }
        .upload-zone:hover {
            border-color: rgba(212, 168, 83, 0.4);
            background: rgba(212, 168, 83, 0.03);
        }

        /* 分隔線 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }

        /* 標題樣式 */
        .page-title {
            letter-spacing: 0.25em;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
        }
        .page-subtitle {
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.75rem;
        }

        /* label 樣式 */
        .field-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-4">
    <!-- 背景光暈 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <div class="max-w-md mx-auto py-8 relative z-10">
        <!-- 標題區塊 -->
        <div class="text-center mb-10">
            <p class="page-subtitle mb-2">LEAVE APPLICATION</p>
            <h1 class="text-2xl page-title">請 假 申 請</h1>
        </div>

        {% if success %}
        <!-- 成功訊息 -->
        <div class="glass rounded-2xl p-8">
            <div class="text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-5" style="background: rgba(212, 168, 83, 0.1); border: 1px solid rgba(212, 168, 83, 0.3);">
                    <i class="fas fa-check text-2xl" style="color: #d4a853;"></i>
                </div>
                <h2 class="text-xl font-light text-white mb-2" style="letter-spacing: 0.1em;">申請成功</h2>
                <p class="text-gray-500 mb-8 text-sm">
                    {% if user_name %}{{ user_name }}，您的{% endif %}請假申請已送出，請等待主管審核。
                </p>
                <a href="/leave" class="inline-flex items-center justify-center px-8 py-3 btn-submit rounded-xl min-h-[48px] text-sm" style="letter-spacing: 0.1em;">
                    <i class="fas fa-plus mr-2 text-xs"></i>再申請一筆
                </a>
            </div>
        </div>
        {% else %}

        {% if not success %}
        <!-- 載入中 -->
        <div id="loading-section" class="glass rounded-2xl p-10 text-center">
            <div class="inline-flex items-center justify-center w-14 h-14 mb-5">
                <i class="fas fa-spinner fa-spin text-2xl" style="color: #d4a853;"></i>
            </div>
            <p class="text-gray-500 text-sm" style="letter-spacing: 0.08em;">正在透過 LINE 登入...</p>
        </div>
        {% endif %}

        {% if error %}
        <div class="glass rounded-xl px-4 py-3 mb-6 flex items-center" style="border-color: rgba(239, 68, 68, 0.3);">
            <i class="fas fa-exclamation-circle mr-3 text-red-400 text-sm"></i>
            <span class="text-red-400 text-sm">{{ error }}</span>
        </div>
        {% endif %}

        <!-- 請假表單 -->
        <div id="form-section" class="hidden">
            <form method="POST" action="/leave" enctype="multipart/form-data">
                <!-- 隱藏欄位 -->
                <input type="hidden" id="line_user_id" name="line_user_id" value="">

                <div class="glass rounded-2xl p-6 space-y-6">

                    <!-- 姓名（自動帶入，唯讀） -->
                    <div>
                        <label class="field-label block mb-2">申請人</label>
                        <div id="applicant-name" class="form-input w-full px-4 py-3 rounded-lg min-h-[48px] flex items-center" style="opacity: 0.7; cursor: not-allowed;">
                            載入中...
                        </div>
                    </div>

                    <div class="divider"></div>

                    <!-- 請假類型 -->
                    <div>
                        <label class="field-label block mb-3">
                            請假類型 <span style="color: #d4a853;">*</span>
                        </label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="cursor-pointer">
                                <input type="radio" name="leave_type" value="事假" class="peer sr-only" checked>
                                <div class="type-card flex flex-col items-center justify-center p-4 rounded-xl min-h-[80px]">
                                    <i class="fas fa-briefcase text-xl text-gray-600 mb-2 type-icon"></i>
                                    <span class="text-sm text-gray-400 type-label">事假</span>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="leave_type" value="病假" class="peer sr-only">
                                <div class="type-card flex flex-col items-center justify-center p-4 rounded-xl min-h-[80px]">
                                    <i class="fas fa-notes-medical text-xl text-gray-600 mb-2 type-icon"></i>
                                    <span class="text-sm text-gray-400 type-label">病假</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <!-- 請假日期 -->
                    <div>
                        <label for="leave_date" class="field-label block mb-2">
                            請假日期 <span style="color: #d4a853;">*</span>
                        </label>
                        <input
                            type="date"
                            id="leave_date"
                            name="leave_date"
                            required
                            class="form-input w-full px-4 py-3 rounded-lg min-h-[48px]"
                        >
                    </div>

                    <div class="divider"></div>

                    <!-- 事假理由 -->
                    <div id="reason-section">
                        <label for="reason" class="field-label block mb-2">
                            請假理由 <span style="color: #d4a853;">*</span>
                        </label>
                        <textarea
                            id="reason"
                            name="reason"
                            rows="3"
                            required
                            placeholder="請說明請假原因..."
                            class="form-input w-full px-4 py-3 rounded-lg resize-none text-sm"
                        ></textarea>
                    </div>

                    <!-- 病假證明上傳 -->
                    <div id="proof-section" class="hidden">
                        <label class="field-label block mb-1">
                            上傳證明文件
                        </label>
                        <p class="text-xs mb-3" style="color: rgba(212, 168, 83, 0.6);">
                            <i class="fas fa-info-circle mr-1"></i>可先送出申請，7 天內補上傳證明
                        </p>
                        <div class="relative">
                            <input
                                type="file"
                                id="proof_file"
                                name="proof_file"
                                accept="image/*"
                                class="hidden"
                            >
                            <label for="proof_file" class="upload-zone flex flex-col items-center justify-center w-full h-40 rounded-xl cursor-pointer">
                                <div id="upload-placeholder" class="text-center">
                                    <i class="fas fa-cloud-arrow-up text-3xl text-gray-600 mb-2"></i>
                                    <p class="text-gray-500 text-sm">點擊上傳證明圖片</p>
                                    <p class="text-gray-600 text-xs mt-1">JPG / PNG（選填）</p>
                                </div>
                                <div id="upload-preview" class="hidden text-center w-full h-full p-2">
                                    <img id="preview-image" class="max-h-28 mx-auto rounded-lg object-contain" src="" alt="預覽">
                                    <p id="file-name" class="text-gray-400 text-xs mt-1 truncate px-2"></p>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 送出按鈕 -->
                <button
                    type="submit"
                    class="btn-submit w-full py-4 px-6 rounded-xl mt-6 flex items-center justify-center min-h-[56px] text-base"
                    style="letter-spacing: 0.15em;"
                >
                    <i class="fas fa-paper-plane mr-3 text-sm"></i>
                    送出申請
                </button>
            </form>
        </div>
        {% endif %}

        <!-- 版權 -->
        <p class="text-center text-sm mt-10" style="color: rgba(255,255,255,0.15); letter-spacing: 0.1em;">
            &copy; <script>document.write(new Date().getFullYear())</script> 寶格教育訓練
        </p>
    </div>

    <!-- 主題切換按鈕 -->
    <button
        id="theme-toggle"
        class="fixed bottom-4 right-4 p-3 glass rounded-full min-w-[44px] min-h-[44px] transition-transform duration-100 active:scale-90"
        style="touch-action: manipulation; -webkit-tap-highlight-color: transparent;"
        title="切換深淺色模式"
    >
        <i class="fas fa-moon text-gray-500"></i>
    </button>

    <script>
        const LIFF_ID = "{{ liff_id }}";

        // 主題切換（保留功能但此設計以深色為主）
        document.getElementById('theme-toggle').addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        });

        // LIFF 初始化
        async function initializeLiff() {
            const loadingSection = document.getElementById('loading-section');
            const formSection = document.getElementById('form-section');

            console.log('開始初始化 LIFF，ID:', LIFF_ID);

            try {
                await liff.init({ liffId: LIFF_ID });
                console.log('LIFF 初始化成功');
                console.log('是否在 LINE 內:', liff.isInClient());
                console.log('是否已登入:', liff.isLoggedIn());

                if (!liff.isLoggedIn()) {
                    console.log('未登入，自動跳轉 LINE 登入...');
                    liff.login({ redirectUri: window.location.href });
                    return;
                }

                console.log('LIFF 已登入，取得用戶資料...');

                let profile;
                try {
                    profile = await liff.getProfile();
                    console.log('用戶資料:', profile);
                } catch (profileError) {
                    console.error('取得用戶資料失敗:', profileError);
                    liff.login({ redirectUri: window.location.href });
                    return;
                }

                document.getElementById('line_user_id').value = profile.userId;

                // 查詢員工資料，自動帶入姓名
                try {
                    const resp = await fetch(`/api/leave/profile?line_user_id=${profile.userId}`);
                    const data = await resp.json();
                    if (data.found) {
                        document.getElementById('applicant-name').textContent = data.real_name;
                        document.getElementById('applicant-name').style.opacity = '1';
                        loadingSection.classList.add('hidden');
                        formSection.classList.remove('hidden');
                        initFormFeatures();
                    } else {
                        loadingSection.innerHTML = `
                            <div class="text-center">
                                <div class="inline-flex items-center justify-center w-14 h-14 rounded-full mb-4" style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);">
                                    <i class="fas fa-user-slash text-xl text-red-400"></i>
                                </div>
                                <h2 class="text-lg font-light text-white mb-2" style="letter-spacing: 0.1em;">尚未註冊</h2>
                                <p class="text-gray-500 text-sm">請先完成員工註冊後，再使用請假功能</p>
                            </div>
                        `;
                        return;
                    }
                } catch (e) {
                    console.error('查詢員工資料失敗:', e);
                    document.getElementById('applicant-name').textContent = profile.displayName;
                    document.getElementById('applicant-name').style.opacity = '1';
                    loadingSection.classList.add('hidden');
                    formSection.classList.remove('hidden');
                    initFormFeatures();
                }
            } catch (error) {
                console.error('LIFF 初始化失敗:', error);
                let errorMsg = error.message || '未知錯誤';

                if (error.code === 'INVALID_ID_TOKEN' || errorMsg.includes('token')) {
                    console.log('Token 無效，重新登入...');
                    try {
                        await liff.init({ liffId: LIFF_ID });
                        liff.logout();
                        liff.login({ redirectUri: window.location.href });
                        return;
                    } catch (e) {
                        console.error('重新登入失敗:', e);
                    }
                }

                loadingSection.innerHTML = `
                    <div class="text-center">
                        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full mb-4" style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);">
                            <i class="fas fa-exclamation-triangle text-xl text-red-400"></i>
                        </div>
                        <h2 class="text-lg font-light text-white mb-2" style="letter-spacing: 0.1em;">載入失敗</h2>
                        <p class="text-gray-600 text-xs mb-1">LIFF ID: ${LIFF_ID || '未設定'}</p>
                        <p class="text-red-400 text-xs mb-5">${errorMsg}</p>
                        <button onclick="location.reload()" class="btn-submit px-6 py-3 rounded-lg text-sm">
                            重新載入
                        </button>
                    </div>
                `;
            }
        }

        // 表單功能初始化
        function initFormFeatures() {
            const leaveTypeRadios = document.querySelectorAll('input[name="leave_type"]');
            const reasonSection = document.getElementById('reason-section');
            const proofSection = document.getElementById('proof-section');
            const reasonInput = document.getElementById('reason');
            const proofInput = document.getElementById('proof_file');

            function toggleSections() {
                const selectedType = document.querySelector('input[name="leave_type"]:checked').value;
                if (selectedType === '事假') {
                    reasonSection.classList.remove('hidden');
                    proofSection.classList.add('hidden');
                    reasonInput.setAttribute('required', 'required');
                } else {
                    reasonSection.classList.add('hidden');
                    proofSection.classList.remove('hidden');
                    reasonInput.removeAttribute('required');
                }
            }

            leaveTypeRadios.forEach(radio => {
                radio.addEventListener('change', toggleSections);
            });

            const proofFileInput = document.getElementById('proof_file');
            const uploadPlaceholder = document.getElementById('upload-placeholder');
            const uploadPreview = document.getElementById('upload-preview');
            const fileNameDisplay = document.getElementById('file-name');
            const previewImage = document.getElementById('preview-image');

            if (proofFileInput) {
                proofFileInput.addEventListener('change', function() {
                    if (this.files && this.files[0]) {
                        const file = this.files[0];
                        if (!file.type.startsWith('image/')) {
                            alert('請上傳圖片檔案（JPG、PNG）');
                            this.value = '';
                            return;
                        }
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            previewImage.src = e.target.result;
                            uploadPlaceholder.classList.add('hidden');
                            uploadPreview.classList.remove('hidden');
                        };
                        reader.readAsDataURL(file);
                        fileNameDisplay.textContent = file.name;
                    } else {
                        uploadPlaceholder.classList.remove('hidden');
                        uploadPreview.classList.add('hidden');
                        previewImage.src = '';
                    }
                });
            }

            const now = new Date();
            const currentHour = now.getHours();
            let minDate = new Date();

            if (currentHour >= 17) {
                minDate.setDate(minDate.getDate() + 1);
            }

            const minDateStr = minDate.toISOString().split('T')[0];
            const leaveDateInput = document.getElementById('leave_date');
            if (leaveDateInput) {
                leaveDateInput.setAttribute('min', minDateStr);

                const form = leaveDateInput.closest('form');
                if (form) {
                    form.addEventListener('submit', function(e) {
                        const selectedDate = leaveDateInput.value;
                        const todayStr = new Date().toISOString().split('T')[0];
                        const checkTime = new Date();

                        if (selectedDate === todayStr && checkTime.getHours() >= 17) {
                            e.preventDefault();
                            alert('當日請假需在下午 5 點前提出申請，請選擇其他日期');
                            return false;
                        }
                    });
                }
            }
        }

        // 頁面載入時初始化 LIFF
        {% if not success %}
        if (LIFF_ID) {
            initializeLiff();
        } else {
            document.getElementById('loading-section').innerHTML = `
                <div class="text-center">
                    <div class="inline-flex items-center justify-center w-14 h-14 rounded-full mb-4" style="background: rgba(212,168,83,0.1); border: 1px solid rgba(212,168,83,0.3);">
                        <i class="fas fa-cog text-xl" style="color: #d4a853;"></i>
                    </div>
                    <h2 class="text-lg font-light text-white mb-2" style="letter-spacing: 0.1em;">系統設定中</h2>
                    <p class="text-gray-500 text-sm">請聯繫管理員設定 LIFF ID</p>
                </div>
            `;
        }
        {% endif %}
    </script>
</body>
</html>
