<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的排班 - 值日專區</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 400: '#d4a853', 500: '#c9952e', 600: '#b8841a' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/duty-dark.css">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="min-h-screen">
    <!-- 背景光暈 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- 頂部導航 -->
    <div class="nav-glass px-4 py-4 sticky top-0 z-10">
        <div class="flex items-center gap-3 max-w-lg mx-auto">
            <a href="/duty/my" class="btn-back">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-lg font-light text-white" style="letter-spacing: 0.15em;">我 的 排 班</h1>
        </div>
    </div>

    <div class="max-w-lg mx-auto p-4 relative z-10">
        <!-- 載入中 -->
        <div id="loading-section" class="glass rounded-2xl p-10 text-center">
            <div class="inline-flex items-center justify-center w-14 h-14 mb-5">
                <i class="fas fa-spinner fa-spin text-2xl" style="color: #d4a853;"></i>
            </div>
            <p style="color: rgba(255,255,255,0.35); letter-spacing: 0.08em;" class="text-sm">正在載入...</p>
        </div>

        <!-- 排班列表 -->
        <div id="schedule-list" class="hidden space-y-3">
            <!-- 動態載入 -->
        </div>

        <div id="empty-state" class="hidden glass rounded-2xl p-10 text-center">
            <i class="fas fa-calendar-times text-5xl mb-4" style="color: rgba(255,255,255,0.15);"></i>
            <p style="color: rgba(255,255,255,0.35);">目前沒有排班</p>
        </div>
    </div>

    <script>
        const LIFF_ID = "{{ liff_id }}";
        let currentUser = null;

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }
                const profile = await liff.getProfile();
                currentUser = { lineUserId: profile.userId };
                await loadSchedules();
            } catch (error) {
                document.getElementById('loading-section').innerHTML = `
                    <div class="text-center">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4" style="color: #f87171;"></i>
                        <p style="color: rgba(255,255,255,0.35);">載入失敗，請重試</p>
                        <button onclick="location.reload()" class="btn-submit mt-4 px-4 py-2 rounded-lg">重新載入</button>
                    </div>
                `;
            }
        }

        async function loadSchedules() {
            try {
                const response = await fetch(`/duty/my/api/schedule?line_user_id=${currentUser.lineUserId}`);
                const data = await response.json();

                document.getElementById('loading-section').classList.add('hidden');

                if (data.schedules && data.schedules.length > 0) {
                    const list = document.getElementById('schedule-list');
                    list.innerHTML = data.schedules.map(s => `
                        <div class="glass rounded-xl p-4 flex items-center justify-between ${s.is_today ? 'ring-today' : ''}">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 rounded-xl flex flex-col items-center justify-center ${s.is_past ? 'date-box past' : 'date-box'}">
                                    <span class="text-lg font-bold">${new Date(s.duty_date).getDate()}</span>
                                    <span class="text-xs" style="opacity: 0.7;">${s.weekday.replace('星期', '')}</span>
                                </div>
                                <div>
                                    <p class="font-light text-white">${s.duty_date}</p>
                                    <p class="text-sm" style="color: rgba(255,255,255,0.4);">${s.weekday}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                ${s.is_today ? '<span class="px-2 py-1 text-xs rounded-full" style="background: rgba(212,168,83,0.15); color: #d4a853;">今天</span>' : ''}
                                <span class="px-3 py-1 text-sm rounded-full ${getStatusClass(s.status)}">${s.status_display}</span>
                            </div>
                        </div>
                    `).join('');
                    list.classList.remove('hidden');
                } else {
                    document.getElementById('empty-state').classList.remove('hidden');
                }
            } catch (error) {
                console.error('載入排班失敗:', error);
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'scheduled': return 'badge-scheduled';
                case 'reported': return 'badge-reported';
                case 'approved': return 'badge-approved';
                case 'missed': return 'badge-missed';
                default: return 'badge-default';
            }
        }

        if (LIFF_ID) {
            initializeLiff();
        }
    </script>
</body>
</html>
